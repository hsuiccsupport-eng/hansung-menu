<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한성대 학식 알리미</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f3f5f7; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-800 antialiased flex justify-center min-h-screen">
    <div class="w-full max-w-md bg-gray-50 min-h-screen relative shadow-2xl flex flex-col overflow-hidden">
        
        <!-- 헤더 -->
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 pt-12 pb-4 px-6 border-b border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-gray-900">오늘의 학교 식당 메뉴는?</h1>
                    <p class="text-sm font-medium text-gray-500 mt-1" id="current-date">데이터 불러오는 중...</p>
                </div>
                <button class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 transition">
                    <i data-lucide="calendar" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- 탭 -->
            <div class="flex p-1 bg-gray-100/80 rounded-2xl relative">
                <div id="tab-bg" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-white rounded-xl shadow-sm transition-all duration-300 ease-out z-0"></div>
                <button onclick="switchTab('student')" id="tab-student" class="flex-1 py-2.5 text-sm font-semibold text-gray-900 z-10 relative transition-colors duration-300">학생식당</button>
                <button onclick="switchTab('staff')" id="tab-staff" class="flex-1 py-2.5 text-sm font-semibold text-gray-500 z-10 relative transition-colors duration-300">교직원식당</button>
            </div>
        </header>

        <!-- 메인 콘텐츠 영역 -->
        <main class="flex-1 overflow-y-auto p-6 pb-24" id="menu-container">
            <!-- 메뉴 카드가 렌더링되는 곳 -->
            <div class="flex justify-center items-center h-40">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-500"></div>
            </div>
        </main>

        <!-- 하단 네비게이션 -->
        <nav class="bg-white border-t border-gray-200 absolute bottom-0 w-full flex justify-around items-center pb-safe pt-2 pb-6 px-4">
            <button class="flex flex-col items-center p-2 text-brand-600">
                <i data-lucide="utensils" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">오늘 메뉴</span>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400 hover:text-gray-600 transition">
                <i data-lucide="heart" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium">즐겨찾기</span>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400 hover:text-gray-600 transition">
                <i data-lucide="settings" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium">설정</span>
            </button>
        </nav>
    </div>

    <script>
        // 전역 변수로 서버 데이터를 저장할 공간 마련
        let appData = { student: [], staff: [] };

        // 1. JSON 파일 불러오기 (Fetch API)
        async function fetchMenuData() {
            try {
                // 파이썬이 생성한 JSON 파일을 읽어옵니다. 
                // 캐시 방지를 위해 뒤에 시간값을 붙여 항상 최신 파일을 가져옵니다.
                const response = await fetch('menu_data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                appData = data; // 불러온 데이터를 전역 변수에 저장
                
                // 상단에 크롤링된 시간 표시 (파이썬에서 넣어준 updated_at 활용)
                const dateParts = data.updated_at.split(' ');
                document.getElementById('current-date').innerText = `마지막 업데이트: ${dateParts[0]}`;
                
                // 데이터 로드 완료 후 학생식당 탭 렌더링
                switchTab('student');

            } catch (error) {
                console.error('데이터 로딩 에러:', error);
                document.getElementById('current-date').innerText = "데이터를 불러올 수 없습니다.";
                document.getElementById('menu-container').innerHTML = `
                    <div class="text-center text-gray-500 mt-10">
                        <p>메뉴 정보를 가져오지 못했습니다.</p>
                        <p class="text-sm mt-2">인터넷 연결을 확인하거나 나중에 다시 시도해주세요.</p>
                    </div>`;
            }
        }

        function createStudentCard(cornerData) {
            // 메뉴가 비어있을 경우 예외 처리
            if (!cornerData.items || cornerData.items.length === 0) return '';

            const itemsHtml = cornerData.items.map(item => `
                <div class="flex justify-between items-center py-3 border-b border-gray-50 last:border-0 last:pb-0">
                    <span class="text-[15px] font-semibold text-gray-800">${item.name}</span>
                    <span class="text-sm font-bold text-brand-600">${item.price}</span>
                </div>
            `).join('');

            return `
                <div class="bg-white rounded-3xl p-5 shadow-[0_4px_20px_rgba(0,0,0,0.03)] mb-4 border border-gray-100 fade-in">
                    <div class="flex items-center mb-2 pb-3 border-b border-gray-100">
                        <div class="bg-gray-50 p-2 rounded-xl mr-3 text-gray-500">
                            <i data-lucide="${cornerData.icon}" class="w-5 h-5"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900">${cornerData.corner}</h3>
                    </div>
                    <div class="flex flex-col">
                        ${itemsHtml}
                    </div>
                </div>
            `;
        }

        function createStaffCard(item) {
            if (!item.menus || item.menus.length === 0) return '';

            const menusHtml = item.menus.map(menu => 
                `<span class="bg-gray-100 text-gray-700 text-sm font-medium px-3 py-1.5 rounded-xl">${menu}</span>`
            ).join('');

            return `
                <div class="bg-white rounded-3xl p-6 shadow-[0_4px_20px_rgba(0,0,0,0.03)] mb-5 border border-gray-100 fade-in">
                    <div class="flex justify-between items-center mb-5">
                        <div class="flex items-center gap-2">
                            <span class="bg-gray-800 text-white text-xs font-bold px-2.5 py-1 rounded-md">${item.type}</span>
                            <span class="text-xs font-semibold text-gray-400">${item.time}</span>
                        </div>
                        <span class="text-sm font-bold text-gray-400">자율배식</span>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-6">
                        ${menusHtml}
                    </div>
                    <div class="flex justify-between items-center border-t border-gray-100 pt-4">
                        <span class="text-lg font-extrabold text-brand-600 tracking-tight">${item.price}</span>
                        <button class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors">
                            <i data-lucide="heart" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function switchTab(type) {
            const container = document.getElementById('menu-container');
            const tabBg = document.getElementById('tab-bg');
            const tabStudent = document.getElementById('tab-student');
            const tabStaff = document.getElementById('tab-staff');

            container.innerHTML = '';
            
            // 등록된 메뉴가 없을 때의 처리
            if (!appData[type] || appData[type].length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-40 text-gray-400">
                        <i data-lucide="chef-hat" class="w-12 h-12 mb-3 opacity-50"></i>
                        <p class="font-medium">오늘은 등록된 메뉴가 없습니다.</p>
                    </div>`;
            } else {
                if (type === 'student') {
                    appData.student.forEach(item => container.innerHTML += createStudentCard(item));
                    tabBg.style.transform = 'translateX(0)';
                    tabStudent.classList.replace('text-gray-500', 'text-gray-900');
                    tabStaff.classList.replace('text-gray-900', 'text-gray-500');
                } else {
                    appData.staff.forEach(item => container.innerHTML += createStaffCard(item));
                    tabBg.style.transform = 'translateX(100%)';
                    tabStaff.classList.replace('text-gray-500', 'text-gray-900');
                    tabStudent.classList.replace('text-gray-900', 'text-gray-500');
                }
            }

            lucide.createIcons();
        }

        // 앱 시작 시 아이콘 렌더링 및 데이터 호출
        lucide.createIcons();
        fetchMenuData();
    </script>
</body>
</html>
