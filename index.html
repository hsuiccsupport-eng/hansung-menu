<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한성대 학식 알리미</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' } }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 아코디언(details) 스타일 제거 */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-gray-200 dark:bg-black text-gray-800 dark:text-gray-200 antialiased flex justify-center min-h-screen transition-colors duration-300">
    <div class="w-full max-w-md bg-gray-50 dark:bg-gray-900 min-h-screen relative shadow-2xl flex flex-col overflow-hidden transition-colors duration-300">
        
        <!-- 헤더 -->
        <header class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md sticky top-0 z-50 pt-12 pb-4 px-6 border-b border-gray-100 dark:border-gray-800 transition-colors duration-300">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-gray-900 dark:text-white">오늘의 학교 식당 메뉴는?</h1>
                    <p class="text-sm font-medium text-gray-500 dark:text-gray-400 mt-1" id="current-date-display">데이터 불러오는 중...</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                        <i data-lucide="moon" id="dark-icon" class="w-5 h-5"></i>
                    </button>
                    <button onclick="toggleCalendar()" id="calendar-btn" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                        <i data-lucide="calendar" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- 캘린더 -->
            <div class="flex overflow-x-auto gap-2 mb-4 pb-1 hide-scroll fade-in" id="calendar-bar" style="display: none;"></div>

            <!-- 탭 -->
            <div class="flex p-1 bg-gray-100/80 dark:bg-gray-800/80 rounded-2xl relative">
                <div id="tab-bg" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-white dark:bg-gray-700 rounded-xl shadow-sm transition-all duration-300 ease-out z-0"></div>
                <button onclick="switchTab('student')" id="tab-student" class="flex-1 py-2.5 text-sm font-semibold text-gray-900 dark:text-white z-10 relative transition-colors duration-300">학생식당</button>
                <button onclick="switchTab('staff')" id="tab-staff" class="flex-1 py-2.5 text-sm font-semibold text-gray-500 dark:text-gray-400 z-10 relative transition-colors duration-300">교직원식당</button>
            </div>
        </header>

        <!-- 메인 콘텐츠 영역 -->
        <main class="flex-1 overflow-y-auto p-6 pb-24" id="menu-container">
            <div class="flex justify-center items-center h-40">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-500"></div>
            </div>
        </main>

        <!-- 하단 네비게이션 -->
        <nav class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 absolute bottom-0 w-full flex justify-around items-center pb-safe pt-2 pb-6 px-4 transition-colors duration-300">
            <button class="flex flex-col items-center p-2 text-brand-600 dark:text-brand-400">
                <i data-lucide="utensils" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">오늘 메뉴</span>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition">
                <i data-lucide="heart" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium">즐겨찾기</span>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition">
                <i data-lucide="settings" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium">설정</span>
            </button>
        </nav>
    </div>

    <script>
        let appData = { daily_menus: {} };
        let currentDate = '';
        let currentTab = 'student';
        let isDarkMode = false;
        let isCalendarOpen = false;

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                document.getElementById('dark-icon').setAttribute('data-lucide', 'sun');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('dark-icon').setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
        }

        function toggleCalendar() {
            isCalendarOpen = !isCalendarOpen;
            const calBar = document.getElementById('calendar-bar');
            const calBtn = document.getElementById('calendar-btn');
            
            if (isCalendarOpen) {
                calBar.style.display = 'flex';
                calBtn.classList.add('bg-gray-200', 'dark:bg-gray-700', 'text-brand-600', 'dark:text-brand-400');
            } else {
                calBar.style.display = 'none';
                calBtn.classList.remove('bg-gray-200', 'dark:bg-gray-700', 'text-brand-600', 'dark:text-brand-400');
            }
        }

        function renderCalendar() {
            const calBar = document.getElementById('calendar-bar');
            calBar.innerHTML = '';
            
            const availableDates = Object.keys(appData.daily_menus).sort();
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

            availableDates.forEach(dateStr => {
                const d = new Date(dateStr);
                const dayName = dayNames[d.getDay()];
                const displayStr = `${d.getMonth() + 1}/${d.getDate()} (${dayName})`;
                
                const isSelected = dateStr === currentDate;
                const activeClass = isSelected 
                    ? "bg-brand-500 text-white shadow-md border-transparent" 
                    : "bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-gray-200 dark:border-gray-700";

                calBar.innerHTML += `
                    <button onclick="selectDate('${dateStr}')" class="flex-shrink-0 px-4 py-2 border rounded-full text-sm font-bold transition-all ${activeClass}">
                        ${displayStr}
                    </button>
                `;
            });
        }

        function selectDate(dateStr) {
            currentDate = dateStr;
            renderCalendar();
            
            const d = new Date(currentDate);
            document.getElementById('current-date-display').innerText = `${d.getMonth() + 1}월 ${d.getDate()}일 식단 보기`;
            switchTab(currentTab);
        }

        async function fetchMenuData() {
            try {
                const response = await fetch('menu_data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('서버 응답 오류');
                
                appData = await response.json();
                
                if (!appData.daily_menus) {
                    throw new Error('데이터 구조가 맞지 않습니다.');
                }
                
                const availableDates = Object.keys(appData.daily_menus).sort();
                if(availableDates.length > 0) {
                    const todayStr = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\./g, '').replace(/\s/g, '-');
                    
                    if (availableDates.includes(todayStr)) {
                        currentDate = todayStr;
                    } else {
                        currentDate = availableDates[0]; 
                    }
                    
                    renderCalendar();
                    selectDate(currentDate);
                }
            } catch (error) {
                document.getElementById('current-date-display').innerText = "데이터 연결 실패";
                document.getElementById('menu-container').innerHTML = `
                    <div class="text-center text-gray-500 dark:text-gray-400 mt-10 p-4 border border-red-100 dark:border-red-900 bg-red-50 dark:bg-red-900/20 rounded-3xl">
                        <p class="font-bold text-gray-700 dark:text-gray-300 mb-2">메뉴 정보를 가져오지 못했습니다.</p>
                        <p class="text-sm text-red-500 dark:text-red-400 font-bold mb-3">${error.message}</p>
                    </div>`;
            }
        }

        // 아코디언 열기/닫기 스르륵 애니메이션 로직
        function toggleAccordion(btn) {
            const content = btn.nextElementSibling;
            const icon = btn.querySelector('.chevron-icon');
            
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                // 닫기
                content.style.maxHeight = '0px';
                content.style.opacity = '0';
                icon.style.transform = 'rotate(0deg)';
            } else {
                // 열기 (내부 컨텐츠의 실제 높이만큼 부드럽게 늘어남)
                content.style.maxHeight = content.scrollHeight + 'px';
                content.style.opacity = '1';
                icon.style.transform = 'rotate(180deg)';
            }
        }

        // 학생식당 카드 렌더링 (스르륵 애니메이션 아코디언 적용)
        function createStudentCard(cornerData) {
            if (!cornerData.items || cornerData.items.length === 0) return '';
            
            const itemsHtml = cornerData.items.map(item => `
                <div class="flex justify-between items-center py-3 border-b border-gray-50 dark:border-gray-800 last:border-0 last:pb-0">
                    <span class="text-[15px] font-semibold text-gray-800 dark:text-gray-200">${item.name}</span>
                    <span class="text-sm font-bold text-brand-600 dark:text-brand-400">${item.price}</span>
                </div>
            `).join('');

            return `
                <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] dark:shadow-none mb-4 border border-gray-100 dark:border-gray-700 fade-in overflow-hidden">
                    <button onclick="toggleAccordion(this)" class="w-full flex items-center justify-between p-5 cursor-pointer select-none outline-none">
                        <div class="flex items-center">
                            <div class="bg-gray-50 dark:bg-gray-700 p-2 rounded-xl mr-3 text-gray-500 dark:text-gray-300">
                                <i data-lucide="${cornerData.icon}" class="w-5 h-5"></i>
                            </div>
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white">${cornerData.corner}</h3>
                        </div>
                        <div class="text-gray-400 transition-transform duration-300 chevron-icon">
                            <i data-lucide="chevron-down" class="w-5 h-5"></i>
                        </div>
                    </button>
                    <!-- 높이(max-height) 0px부터 시작하여 부드럽게 열림 -->
                    <div class="accordion-content transition-all duration-300 ease-in-out" style="max-height: 0px; opacity: 0; overflow: hidden;">
                        <div class="px-5 pb-5 pt-1 border-t border-gray-50 dark:border-gray-800/50">
                            <div class="flex flex-col">
                                ${itemsHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 교직원식당 카드 렌더링 (하트 제거)
        function createStaffCard(item) {
            if (!item.menus || item.menus.length === 0) return '';
            const menusHtml = item.menus.map(menu => 
                `<span class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 text-sm font-medium px-3 py-1.5 rounded-xl">${menu}</span>`
            ).join('');

            return `
                <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow-[0_4px_20px_rgba(0,0,0,0.03)] dark:shadow-none mb-5 border border-gray-100 dark:border-gray-700 fade-in">
                    <div class="flex justify-between items-center mb-5">
                        <div class="flex items-center gap-2">
                            <span class="bg-gray-800 dark:bg-gray-600 text-white text-xs font-bold px-2.5 py-1 rounded-md">${item.type}</span>
                            <span class="text-xs font-semibold text-gray-400 dark:text-gray-400">${item.time}</span>
                        </div>
                        <span class="text-sm font-bold text-gray-400 dark:text-gray-500">자율배식</span>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-6">
                        ${menusHtml}
                    </div>
                    <div class="flex justify-between items-center border-t border-gray-100 dark:border-gray-700 pt-4">
                        <span class="text-lg font-extrabold text-brand-600 dark:text-brand-400 tracking-tight">${item.price}</span>
                    </div>
                </div>
            `;
        }

        function switchTab(type) {
            currentTab = type;
            const container = document.getElementById('menu-container');
            const tabBg = document.getElementById('tab-bg');
            const tabStudent = document.getElementById('tab-student');
            const tabStaff = document.getElementById('tab-staff');

            container.innerHTML = '';
            
            if (!appData.daily_menus[currentDate]) return;

            const selectedMenus = appData.daily_menus[currentDate][type];

            // 데이터가 없거나, 코너는 있지만 세부 메뉴(items/menus)가 아예 없는 경우
            const hasData = selectedMenus && selectedMenus.length > 0 && selectedMenus.some(item => (item.items && item.items.length > 0) || (item.menus && item.menus.length > 0));

            if (!hasData) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-40 text-gray-400 dark:text-gray-500 fade-in">
                        <i data-lucide="chef-hat" class="w-12 h-12 mb-3 opacity-50"></i>
                        <p class="font-medium">이 날짜에는 등록된 식단이 없습니다.</p>
                    </div>`;
            } else {
                if (type === 'student') {
                    selectedMenus.forEach(item => container.innerHTML += createStudentCard(item));
                    tabBg.style.transform = 'translateX(0)';
                    tabStudent.className = "flex-1 py-2.5 text-sm font-semibold text-gray-900 dark:text-white z-10 relative transition-colors duration-300";
                    tabStaff.className = "flex-1 py-2.5 text-sm font-semibold text-gray-500 dark:text-gray-400 z-10 relative transition-colors duration-300";
                } else {
                    selectedMenus.forEach(item => container.innerHTML += createStaffCard(item));
                    tabBg.style.transform = 'translateX(100%)';
                    tabStaff.className = "flex-1 py-2.5 text-sm font-semibold text-gray-900 dark:text-white z-10 relative transition-colors duration-300";
                    tabStudent.className = "flex-1 py-2.5 text-sm font-semibold text-gray-500 dark:text-gray-400 z-10 relative transition-colors duration-300";
                }
            }
            lucide.createIcons();
        }

        lucide.createIcons();
        fetchMenuData();
    </script>
</body>
</html>
