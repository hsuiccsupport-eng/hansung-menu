name: 학식 데이터 자동 업데이트

# 언제 이 로직을 실행할 것인지 설정합니다.
on:
  schedule:
    # 매일 아침 7시 (한국 시간)에 실행되도록 설정
    # 주의: GitHub 서버는 UTC(세계표준시)를 사용하므로, 한국 시간(KST)보다 9시간 느립니다.
    # 매주 일요일 밤 23:00(UTC) = 매주 월요일 오전 08:00(KST)
    - cron: '0 23 * * *'
    
  # 수동으로 원할 때 버튼을 눌러서 실행할 수 있게 해주는 옵션
  workflow_dispatch:

# 실행할 작업 내용
jobs:
  update-data:
    runs-on: ubuntu-latest # 가상의 리눅스 컴퓨터를 한 대 빌립니다.

    # [수정] 깃허브 액션이 저장소에 파일(JSON)을 커밋하고 푸시할 수 있도록 쓰기 권한을 명시합니다.
    permissions:
      contents: write

    steps:
      # 1. 내 GitHub 저장소의 코드들을 가상 컴퓨터로 불러옵니다. (최신 v4로 업데이트)
      - name: 저장소 코드 불러오기
        uses: actions/checkout@v4

      # 2. 가상 컴퓨터에 파이썬을 설치합니다. (최신 v5로 업데이트)
      - name: 파이썬 3.10 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 크롤링에 필요한 파이썬 라이브러리를 설치합니다.
      - name: 필요한 라이브러리 설치 (requests, beautifulsoup4)
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 4. 우리가 만든 크롤러 코드를 실행합니다. (이때 menu_data.json 파일이 새로 생성/수정됨)
      - name: 크롤러 실행
        run: python crawler.py

      # 5. 새롭게 바뀐 menu_data.json 파일을 내 GitHub 저장소에 자동으로 반영(Commit & Push)합니다.
      - name: 변경된 데이터 깃허브에 자동 반영
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add menu_data.json
          
          # 변경된 사항이 있을 때만 커밋하도록 처리
          git diff --quiet && git diff --staged --quiet || git commit -m "🍱 오늘의 학식 데이터 업데이트 완료"
          git push
